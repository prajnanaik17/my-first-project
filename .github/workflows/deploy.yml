name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: Run Tests
        run: npm test || echo "No tests found"

      - name: Build Docker Image
        run: docker build -t mynodeapp .

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy Step
        run: echo "Deploying to EC2..."
